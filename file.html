<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SNEAKERVERSE | Premium Sneaker Store</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            color: #1a1a2e;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        /* Navbar */
        .navbar {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            padding: 1rem 0;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo i {
            background: none;
            -webkit-background-clip: unset;
            color: #667eea;
        }

        .nav-icons {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-icon {
            font-size: 1.3rem;
            cursor: pointer;
            transition: transform 0.3s;
            position: relative;
        }

        .nav-icon:hover {
            transform: scale(1.1);
        }

        .cart-badge,
        .rec-badge {
            position: absolute;
            top: -8px;
            right: -12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 20px;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 1rem 2rem;
            border-radius: 30px;
            padding: 4rem;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .hero-content h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .hero-content p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .hero-shoe {
            font-size: 8rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Filters Bar */
        .filters-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-chip.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: transparent;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        /* Product Card */
        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.4s;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .card-image {
            position: relative;
            height: 280px;
            background: linear-gradient(135deg, #f5f7fa, #e9edf2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-image img {
            width: 80%;
            transition: transform 0.5s;
        }

        .product-card:hover .card-image img {
            transform: scale(1.1) rotate(5deg);
        }

        .quick-add {
            position: absolute;
            bottom: -50px;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            text-align: center;
            padding: 0.8rem;
            transition: bottom 0.3s;
            cursor: pointer;
        }

        .product-card:hover .quick-add {
            bottom: 0;
        }

        .card-info {
            padding: 1.5rem;
        }

        .brand {
            font-size: 0.8rem;
            color: #667eea;
            font-weight: 600;
            text-transform: uppercase;
        }

        .name {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 0.5rem 0;
        }

        .price {
            font-size: 1.3rem;
            font-weight: 800;
            color: #667eea;
        }

        .rating {
            color: #ffc107;
            margin: 0.5rem 0;
        }

        /* Cart Drawer */
        .cart-drawer {
            position: fixed;
            top: 0;
            right: -450px;
            width: 450px;
            height: 100%;
            background: white;
            z-index: 2000;
            box-shadow: -5px 0 30px rgba(0, 0, 0, 0.2);
            transition: right 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            flex-direction: column;
        }

        .cart-drawer.open {
            right: 0;
        }

        .cart-header {
            padding: 1.5rem;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h2 {
            font-size: 1.5rem;
        }

        .close-cart {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid #eee;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(50px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
        }

        .cart-item-price {
            color: #667eea;
            font-weight: 700;
        }

        .cart-item-size {
            font-size: 0.8rem;
            color: #666;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .quantity-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
        }

        .cart-footer {
            padding: 1.5rem;
            border-top: 1px solid #eee;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .checkout-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .checkout-btn:hover {
            transform: scale(0.98);
        }

        .checkout-btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Product Modal */
        .product-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 90%;
            max-width: 1000px;
            max-height: 85vh;
            background: white;
            border-radius: 20px;
            z-index: 2100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            overflow-y: auto;
        }

        .product-modal.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .modal-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            padding: 2rem;
        }

        .modal-image {
            background: linear-gradient(135deg, #f5f7fa, #e9edf2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal-image img {
            width: 100%;
            animation: rotate3d 0.5s;
        }

        @keyframes rotate3d {
            from {
                transform: rotateY(0);
            }

            to {
                transform: rotateY(360deg);
            }
        }

        .size-selector {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 1rem 0;
        }

        .size-btn {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .size-btn.selected {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: transparent;
        }

        .color-selector {
            display: flex;
            gap: 0.8rem;
            margin: 1rem 0;
        }

        .color-option {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .color-option.selected {
            border-color: #667eea;
            transform: scale(1.1);
        }

        .reviews-section {
            margin-top: 1rem;
            border-top: 1px solid #eee;
            padding-top: 1rem;
        }

        .review {
            padding: 0.8rem 0;
            border-bottom: 1px solid #f0f0f0;
        }

        /* AI Recommendations */
        .ai-section {
            margin-top: 3rem;
            padding: 2rem;
            background: linear-gradient(135deg, #f8f9ff, #f0f2ff);
            border-radius: 20px;
        }

        .ai-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .ai-header i {
            font-size: 1.8rem;
            color: #667eea;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        .ai-recommendations {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            padding-bottom: 1rem;
        }

        .ai-card {
            min-width: 200px;
            background: white;
            border-radius: 15px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .ai-card:hover {
            transform: translateY(-5px);
        }

        .ai-card img {
            width: 100%;
            height: 120px;
            object-fit: contain;
        }

        /* Recently Viewed */
        .recent-section {
            margin-top: 2rem;
        }

        .recent-products {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
        }

        .recent-item {
            min-width: 150px;
            background: white;
            border-radius: 12px;
            padding: 0.8rem;
            text-align: center;
            cursor: pointer;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #10b981;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 50px;
            z-index: 3000;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* AR Preview Mockup */
        .ar-preview {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .ar-preview.active {
            opacity: 1;
            visibility: visible;
        }

        .ar-container {
            position: relative;
            width: 80%;
            max-width: 500px;
        }

        .ar-shoe {
            width: 100%;
            animation: arRotate 4s infinite linear;
        }

        @keyframes arRotate {
            from {
                transform: rotateY(0);
            }

            to {
                transform: rotateY(360deg);
            }
        }

        .close-ar {
            position: absolute;
            top: -50px;
            right: 0;
            background: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .modal-content {
                grid-template-columns: 1fr;
            }

            .cart-drawer {
                width: 100%;
            }

            .hero {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-shoe-prints"></i> SNEAKERVERSE
            </div>
            <div class="nav-icons">
                <div class="nav-icon" id="recentBtn">
                    <i class="fas fa-history"></i>
                    <span class="rec-badge" id="recentBadge">0</span>
                </div>
                <div class="nav-icon" id="cartIcon">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-badge" id="cartCount">0</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <div class="hero">
        <div class="hero-content">
            <h1>Step Into Style</h1>
            <p>Premium sneakers for the modern lifestyle</p>
        </div>
        <div class="hero-shoe">
            <i class="fas fa-shoe-prints"></i>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <div class="filters-bar" id="filtersBar">
            <div class="filter-chip active" data-cat="all">All</div>
            <div class="filter-chip" data-cat="Nike">Nike</div>
            <div class="filter-chip" data-cat="Adidas">Adidas</div>
            <div class="filter-chip" data-cat="Jordan">Jordan</div>
            <div class="filter-chip" data-cat="New Balance">New Balance</div>
        </div>

        <div class="products-grid" id="productsGrid"></div>

        <!-- AI Recommendation Section -->
        <div class="ai-section" id="aiSection">
            <div class="ai-header">
                <i class="fas fa-robot"></i>
                <h2>AI Recommends For You</h2>
                <span style="font-size:0.8rem; background:#667eea20; padding:2px 8px; border-radius:20px;">Powered by
                    AI</span>
            </div>
            <div class="ai-recommendations" id="aiRecommendations"></div>
        </div>

        <!-- Recently Viewed -->
        <div class="recent-section" id="recentSection" style="display: none;">
            <h3><i class="fas fa-history"></i> Recently Viewed</h3>
            <div class="recent-products" id="recentProducts"></div>
        </div>
    </div>

    <!-- Cart Drawer -->
    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-header">
            <h2><i class="fas fa-shopping-bag"></i> Your Cart</h2>
            <button class="close-cart" id="closeCartBtn"><i class="fas fa-times"></i></button>
        </div>
        <div class="cart-items" id="cartItems">
            <div style="text-align:center; padding:2rem;">Your cart is empty</div>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotal">$0</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn">
                <i class="fas fa-credit-card"></i> Checkout
            </button>
        </div>
    </div>

    <!-- Overlay -->
    <div class="overlay" id="overlay"></div>

    <!-- Product Modal -->
    <div class="product-modal" id="productModal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <!-- AR Preview -->
    <div class="ar-preview" id="arPreview">
        <div class="ar-container">
            <button class="close-ar" id="closeAR"><i class="fas fa-times"></i> Close AR</button>
            <img src="" alt="AR Preview" class="ar-shoe" id="arImage">
            <p style="color:white; text-align:center; margin-top:1rem;">✨ Move your phone to see in 3D space ✨</p>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast" style="display: none;"></div>

    <script>
        // Product Data
        const products = [
            { id: 1, name: "Air Max Pulse", brand: "Nike", price: 159, image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400", rating: 4.5, reviews: 128, sizes: [7, 8, 9, 10, 11], colors: ["#000", "#fff", "#ff4444"] },
            { id: 2, name: "Yeezy 350 V2", brand: "Adidas", price: 220, image: "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=400", rating: 4.8, reviews: 256, sizes: [7, 8, 9, 10], colors: ["#000", "#ccc", "#8B4513"] },
            { id: 3, name: "Jordan 1 Retro", brand: "Jordan", price: 189, image: "https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb?w=400", rating: 4.9, reviews: 512, sizes: [8, 9, 10, 11, 12], colors: ["#000", "#fff", "#C41E3A"] },
            { id: 4, name: "990v5 Classic", brand: "New Balance", price: 175, image: "https://images.unsplash.com/photo-1584735175091-878a3c9c3c3c?w=400", rating: 4.7, reviews: 189, sizes: [7, 8, 9, 10], colors: ["#808080", "#000", "#fff"] },
            { id: 5, name: "Air Force 1 '07", brand: "Nike", price: 110, image: "https://images.unsplash.com/photo-1600185365782-8f8b8c4f6b8e?w=400", rating: 4.6, reviews: 342, sizes: [7, 8, 9, 10, 11], colors: ["#fff", "#000", "#FFD700"] },
            { id: 6, name: "Ultraboost 22", brand: "Adidas", price: 190, image: "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=400", rating: 4.7, reviews: 278, sizes: [7, 8, 9, 10], colors: ["#000", "#fff", "#4169E1"] }
        ];

        // State
        let cart = JSON.parse(localStorage.getItem('sneakerCart')) || [];
        let recentlyViewed = JSON.parse(localStorage.getItem('recentlyViewed')) || [];
        let currentFilter = 'all';
        let currentProduct = null;
        let selectedSize = null;
        let selectedColor = null;

        // Helper Functions
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            toast.style.background = isError ? '#ef4444' : '#10b981';
            setTimeout(() => toast.style.display = 'none', 2000);
        }

        function updateCartCount() {
            const count = cart.reduce((sum, i) => sum + i.quantity, 0);
            document.getElementById('cartCount').textContent = count;
            localStorage.setItem('sneakerCart', JSON.stringify(cart));
        }

        function updateRecentBadge() {
            document.getElementById('recentBadge').textContent = recentlyViewed.length;
        }

        function addToRecentlyViewed(product) {
            recentlyViewed = recentlyViewed.filter(p => p.id !== product.id);
            recentlyViewed.unshift(product);
            if (recentlyViewed.length > 4) recentlyViewed.pop();
            localStorage.setItem('recentlyViewed', JSON.stringify(recentlyViewed));
            updateRecentBadge();
            renderRecentlyViewed();
        }

        function addToCart(product, size, color) {
            const existing = cart.find(i => i.id === product.id && i.size === size && i.color === color);
            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ ...product, quantity: 1, size: size, color: color });
            }
            updateCartCount();
            renderCart();
            showToast(`✓ Added ${product.name} (Size ${size}) to cart!`);

            // Animate cart icon
            const cartIcon = document.getElementById('cartIcon');
            cartIcon.style.transform = 'scale(1.2)';
            setTimeout(() => cartIcon.style.transform = 'scale(1)', 200);
        }

        function removeFromCart(id, size, color) {
            cart = cart.filter(i => !(i.id === id && i.size === size && i.color === color));
            updateCartCount();
            renderCart();
            showToast('Item removed');
        }

        function updateQuantity(id, size, color, delta) {
            const item = cart.find(i => i.id === id && i.size === size && i.color === color);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    removeFromCart(id, size, color);
                } else {
                    updateCartCount();
                    renderCart();
                }
            }
        }

        // Render Functions
        function renderProducts() {
            const filtered = currentFilter === 'all' ? products : products.filter(p => p.brand === currentFilter);
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = filtered.map(p => `
                <div class="product-card" onclick="openProductModal(${p.id})">
                    <div class="card-image">
                        <img src="${p.image}" alt="${p.name}">
                        <div class="quick-add" onclick="event.stopPropagation(); openProductModal(${p.id})">
                            <i class="fas fa-eye"></i> Quick View
                        </div>
                    </div>
                    <div class="card-info">
                        <div class="brand">${p.brand}</div>
                        <div class="name">${p.name}</div>
                        <div class="rating">${'★'.repeat(Math.floor(p.rating))}${'☆'.repeat(5 - Math.floor(p.rating))} (${p.reviews})</div>
                        <div class="price">$${p.price}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            const total = cart.reduce((sum, i) => sum + i.price * i.quantity, 0);
            document.getElementById('cartTotal').textContent = `$${total}`;

            if (cart.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:2rem;">Your cart is empty<br>👟</div>';
                return;
            }

            container.innerHTML = cart.map(i => `
                <div class="cart-item">
                    <img src="${i.image}" alt="${i.name}">
                    <div class="cart-item-details">
                        <div class="cart-item-name">${i.name}</div>
                        <div class="cart-item-price">$${i.price}</div>
                        <div class="cart-item-size">Size: ${i.size} | Color: <span style="background:${i.color}; width:12px; height:12px; display:inline-block; border-radius:50%;"></span></div>
                        <div class="quantity-control">
                            <button class="quantity-btn" onclick="updateQuantity(${i.id}, '${i.size}', '${i.color}', -1)">-</button>
                            <span>${i.quantity}</span>
                            <button class="quantity-btn" onclick="updateQuantity(${i.id}, '${i.size}', '${i.color}', 1)">+</button>
                        </div>
                    </div>
                    <button onclick="removeFromCart(${i.id}, '${i.size}', '${i.color}')" style="background:none; border:none; font-size:1.2rem; cursor:pointer;">🗑️</button>
                </div>
            `).join('');
        }

        function openProductModal(id) {
            const product = products.find(p => p.id === id);
            currentProduct = product;
            addToRecentlyViewed(product);

            const modal = document.getElementById('productModal');
            const content = document.getElementById('modalContent');

            content.innerHTML = `
                <div class="modal-image">
                    <img src="${product.image}" alt="${product.name}" id="modalImage">
                </div>
                <div>
                    <div class="brand">${product.brand}</div>
                    <h2>${product.name}</h2>
                    <div class="rating">${'★'.repeat(Math.floor(product.rating))} (${product.reviews} reviews)</div>
                    <div class="price" style="font-size:1.8rem;">$${product.price}</div>
                    
                    <h4>Select Size:</h4>
                    <div class="size-selector" id="sizeSelector">
                        ${product.sizes.map(s => `<button class="size-btn" data-size="${s}">${s}</button>`).join('')}
                    </div>
                    
                    <h4>Select Color:</h4>
                    <div class="color-selector" id="colorSelector">
                        ${product.colors.map(c => `<div class="color-option" style="background:${c};" data-color="${c}"></div>`).join('')}
                    </div>
                    
                    <button class="checkout-btn" id="modalAddToCart" style="margin-top:1rem;">
                        <i class="fas fa-shopping-cart"></i> Add to Cart
                    </button>
                    
                    <button class="checkout-btn" id="arPreviewBtn" style="margin-top:0.5rem; background:linear-gradient(135deg,#667eea,#764ba2);">
                        <i class="fas fa-vr-cardboard"></i> AR Preview (3D)
                    </button>
                    
                    <div class="reviews-section">
                        <h4>Customer Reviews</h4>
                        <div class="review"><strong>⭐ ${product.rating}/5</strong> - "Amazing comfort and style!" - John D.</div>
                        <div class="review"><strong>⭐ ${product.rating}/5</strong> - "Best sneakers I've ever owned" - Sarah K.</div>
                        <div class="review"><strong>⭐ ${(product.rating - 0.2).toFixed(1)}/5</strong> - "Great quality, true to size" - Mike R.</div>
                    </div>
                </div>
            `;

            modal.classList.add('active');
            document.getElementById('overlay').classList.add('active');

            // Size selection
            document.querySelectorAll('.size-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedSize = parseInt(this.dataset.size);
                });
            });

            // Color selection
            document.querySelectorAll('.color-option').forEach(opt => {
                opt.addEventListener('click', function () {
                    document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedColor = this.dataset.color;
                });
            });

            // Add to cart button
            document.getElementById('modalAddToCart').addEventListener('click', () => {
                if (!selectedSize) {
                    showToast('Please select a size!', true);
                    return;
                }
                if (!selectedColor) {
                    showToast('Please select a color!', true);
                    return;
                }
                addToCart(product, selectedSize, selectedColor);
                modal.classList.remove('active');
                document.getElementById('overlay').classList.remove('active');
            });

            // AR Preview
            document.getElementById('arPreviewBtn').addEventListener('click', () => {
                document.getElementById('arImage').src = product.image;
                document.getElementById('arPreview').classList.add('active');
                modal.classList.remove('active');
            });
        }

        function renderAIRecommendations() {
            // AI logic based on cart and recently viewed
            let recommended = [];
            if (cart.length > 0) {
                const cartBrands = [...new Set(cart.map(i => i.brand))];
                recommended = products.filter(p => cartBrands.includes(p.brand) && !cart.some(c => c.id === p.id));
            }
            if (recommended.length < 3 && recentlyViewed.length > 0) {
                const recentBrands = [...new Set(recentlyViewed.map(r => r.brand))];
                const more = products.filter(p => recentBrands.includes(p.brand) && !recommended.some(r => r.id === p.id));
                recommended = [...recommended, ...more];
            }
            if (recommended.length < 3) {
                recommended = products.filter(p => p.rating > 4.5).slice(0, 3);
            }

            const container = document.getElementById('aiRecommendations');
            container.innerHTML = recommended.slice(0, 4).map(p => `
                <div class="ai-card" onclick="openProductModal(${p.id})">
                    <img src="${p.image}" alt="${p.name}">
                    <strong>${p.name}</strong>
                    <div>$${p.price}</div>
                    <div style="font-size:0.8rem;">⭐ ${p.rating}</div>
                </div>
            `).join('');
        }

        function renderRecentlyViewed() {
            const section = document.getElementById('recentSection');
            const container = document.getElementById('recentProducts');

            if (recentlyViewed.length > 0) {
                section.style.display = 'block';
                container.innerHTML = recentlyViewed.map(p => `
                    <div class="recent-item" onclick="openProductModal(${p.id})">
                        <img src="${p.image}" alt="${p.name}" style="width:100%; height:100px; object-fit:contain;">
                        <div style="font-size:0.8rem;">${p.name}</div>
                    </div>
                `).join('');
            } else {
                section.style.display = 'none';
            }
        }

        // Event Listeners
        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', function () {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.cat;
                renderProducts();
            });
        });

        document.getElementById('cartIcon').addEventListener('click', () => {
            document.getElementById('cartDrawer').classList.add('open');
            document.getElementById('overlay').classList.add('active');
        });

        document.getElementById('closeCartBtn').addEventListener('click', () => {
            document.getElementById('cartDrawer').classList.remove('open');
            document.getElementById('overlay').classList.remove('active');
        });

        document.getElementById('recentBtn').addEventListener('click', () => {
            renderRecentlyViewed();
            document.getElementById('recentSection').scrollIntoView({ behavior: 'smooth' });
        });

        document.getElementById('overlay').addEventListener('click', () => {
            document.getElementById('cartDrawer').classList.remove('open');
            document.getElementById('productModal').classList.remove('active');
            document.getElementById('arPreview').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        });

        document.getElementById('closeAR').addEventListener('click', () => {
            document.getElementById('arPreview').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        });

        document.getElementById('checkoutBtn').addEventListener('click', () => {
            if (cart.length === 0) {
                showToast('Cart is empty!', true);
                return;
            }
            showToast('🎉 Order placed! Check your email for confirmation');
            setTimeout(() => {
                cart = [];
                updateCartCount();
                renderCart();
                document.getElementById('cartDrawer').classList.remove('open');
                document.getElementById('overlay').classList.remove('active');
            }, 1500);
        });

        // Initialize
        renderProducts();
        renderCart();
        renderAIRecommendations();
        renderRecentlyViewed();
        updateCartCount();
        updateRecentBadge();
    </script>
</body>

</html>
